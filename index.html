<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Меню | Ресторан</title>

    <meta name="theme-color" content="#ff6400">
    <style>
        :root {
            --bg: #faf9f7;
            --card: #ffffff;
            --primary: #ff6400;
            --primary-light: #fff1e6;
            --text: #2c2c2c;
            --text-light: #6b7280;
            --border: #e5e0d8;
            --radius: 16px;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --highlight: #ffead4;
        }
        .dark {
            --bg: #1c1b1a;
            --card: #2a2826;
            --text: #f0ebe4;
            --text-light: #a8a29e;
            --border: #3d3935;
            --primary: #ff6400;
            --primary-light: #3d2a1c;
            --highlight: #5c3d1c;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            -webkit-tap-highlight-color: transparent;
            line-height: 1.4;
        }
        .container {
            max-width: 1200px; margin: 0 auto; min-height: 100vh;
            padding: 1rem 1.5rem;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 1.2rem; flex-wrap: wrap; gap: 0.5rem;
        }
        .restaurant-name { font-size: 1.8rem; font-weight: 800; }
        .header-actions { display: flex; gap: 0.5rem; align-items: center; }
        .icon-btn {
            background: var(--card); border: 1px solid var(--border); border-radius: 30px;
            width: 42px; height: 42px; display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; cursor: pointer; transition: 0.2s; color: var(--text);
            text-decoration: none;
        }
        .icon-btn:active { background: var(--primary); color: white; }
        .search-area {
            background: var(--card); border-radius: var(--radius); padding: 0.8rem 1rem;
            margin-bottom: 1rem; box-shadow: var(--shadow);
            display: flex; flex-wrap: wrap; gap: 0.8rem; align-items: center;
        }
        .search-input {
            flex: 2; min-width: 150px; padding: 0.7rem 1rem; border: 1px solid var(--border);
            border-radius: 12px; font-size: 1rem; background: var(--bg); color: var(--text); outline: none;
        }
        .search-input:focus { border-color: var(--primary); }
        .filter-group { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
        .filter-group label { font-size: 0.85rem; color: var(--text-light); }
        .filter-group input[type=number] {
            width: 80px; padding: 0.5rem; border: 1px solid var(--border); border-radius: 10px;
            background: var(--bg); color: var(--text); font-size: 0.9rem;
        }
        .clear-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-light);
            padding: 0.5rem 0.8rem; border-radius: 10px; cursor: pointer; font-size: 0.8rem;
        }
        .clear-btn:active { background: var(--primary-light); }
        .tabs {
            display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem;
            margin-bottom: 1rem; scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 0.5rem 1.2rem; border-radius: 20px; background: var(--card);
            border: 1px solid var(--border); white-space: nowrap; cursor: pointer;
            font-weight: 500; font-size: 0.9rem; transition: 0.2s; color: var(--text);
        }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .menu-grid {
            display: grid; gap: 1rem;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }
        @media (max-width: 480px) {
            .container { padding: 0.8rem; }
            .menu-grid { grid-template-columns: 1fr; }
        }
        .menu-item {
            background: var(--card); border-radius: var(--radius); padding: 1rem;
            box-shadow: var(--shadow); display: flex; gap: 1rem;
            transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
            border: 1px solid transparent;
        }
        .menu-item:hover { box-shadow: 0 6px 16px rgba(0,0,0,0.08); }
        .menu-item:active { transform: scale(0.99); }
        .item-img {
            width: 90px; height: 90px; border-radius: 14px; background: var(--bg);
            flex-shrink: 0; object-fit: cover; font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .item-img.emoji-placeholder { background: var(--primary-light); }
        .item-info { flex: 1; display: flex; flex-direction: column; gap: 0.2rem; min-width: 0; }
        .item-name { font-weight: 700; font-size: 1.1rem; display: flex; align-items: center; gap: 0.3rem; }
        .item-name .highlight { background: var(--highlight); border-radius: 4px; padding: 0 2px; }
        .item-desc { font-size: 0.85rem; color: var(--text-light); }
        .item-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .item-price { font-weight: 800; color: var(--primary); font-size: 1.2rem; }
        .item-weight { font-size: 0.8rem; color: var(--text-light); background: var(--bg); padding: 0.2rem 0.5rem; border-radius: 8px; }
        .empty-state { text-align: center; padding: 3rem; color: var(--text-light); grid-column: 1 / -1; }
        .modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;
            z-index: 200; visibility: hidden; opacity: 0; transition: 0.2s;
        }
        .modal.active { visibility: visible; opacity: 1; }
        .modal-card {
            background: var(--card); border-radius: 24px; padding: 1.8rem; max-width: 420px;
            width: 90%; box-shadow: 0 20px 40px rgba(0,0,0,0.2); position: relative;
            transform: scale(0.9); transition: 0.2s; text-align: center;
        }
        .modal.active .modal-card { transform: scale(1); }
        .modal-img {
            width: 100%; height: 200px; border-radius: 16px; background: var(--bg);
            object-fit: cover; display: flex; align-items: center; justify-content: center;
            font-size: 5rem; margin-bottom: 1rem;
        }
        .modal-name { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
        .modal-desc { color: var(--text-light); margin-bottom: 1rem; }
        .modal-meta { display: flex; gap: 1rem; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
        .modal-price { font-size: 1.8rem; font-weight: 800; color: var(--primary); }
        .modal-weight { background: var(--bg); padding: 0.3rem 0.8rem; border-radius: 12px; font-size: 0.9rem; }
        .close-btn {
            position: absolute; top: 10px; right: 15px; background: var(--bg);
            border: none; font-size: 1.5rem; cursor: pointer; border-radius: 50%;
            width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
            color: var(--text);
        }
        .qr-container { padding: 1rem 0; }
        .qr-container canvas { border-radius: 16px; }
        .qr-actions { margin-top: 1rem; display: flex; gap: 0.5rem; justify-content: center; }
        .qr-actions button {
            background: var(--primary); color: white; border: none; padding: 0.5rem 1rem;
            border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 0.9rem;
        }
        /* Стили для печати */
        @media print {
            .top-bar, .search-area, .tabs, .icon-btn, .qr-actions, .modal, button, .header-actions {
                display: none !important;
            }
            body { background: white; color: black; }
            .container { padding: 0; max-width: 100%; }
            .menu-grid { grid-template-columns: 1fr; gap: 0.5rem; }
            .menu-item { box-shadow: none; border-bottom: 1px solid #ddd; page-break-inside: avoid; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <div class="restaurant-name">🍽️ Меню</div>
            <div class="header-actions">
                <button class="icon-btn" id="themeBtn" title="Тёмная тема">🌓</button>
                <button class="icon-btn" id="printBtn" title="Распечатать меню">🖨️</button>
                <button class="icon-btn" id="qrBtn" title="QR‑код меню">📱</button>
            </div>
        </div>
        <div class="search-area">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск блюда или цены...">
            <div class="filter-group">
                <label>Цена до:</label>
                <input type="number" id="maxPriceInput" placeholder="₸" min="0" step="100">
                <button class="clear-btn" id="clearFilters">Сбросить</button>
            </div>
        </div>
        <div class="tabs" id="tabsContainer"></div>
        <div class="menu-grid" id="menuGrid"></div>
    </div>

    <div class="modal" id="detailModal">
        <div class="modal-card">
            <button class="close-btn" id="closeDetailModal">✕</button>
            <div class="modal-img" id="modalImg"></div>
            <div class="modal-name" id="modalName"></div>
            <div class="modal-desc" id="modalDesc"></div>
            <div class="modal-meta">
                <span class="modal-price" id="modalPrice"></span>
                <span class="modal-weight" id="modalWeight"></span>
            </div>
        </div>
    </div>

    <div class="modal" id="qrModal">
        <div class="modal-card">
            <button class="close-btn" id="closeQrModal">✕</button>
            <h3 style="margin-bottom:1rem;">Menu QR Code</h3>
            <div class="qr-container">
                <canvas id="qrCanvas"></canvas>
            </div>
            <p style="font-size:0.85rem; color:var(--text-light); margin-top:0.5rem;">
                Long press to save as image
            </p>
            <div class="qr-actions">
                <button id="downloadPng">Download PNG</button>
                <button id="downloadPdfQr">Download PDF</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script>
        const menuData = {
            "restaurantName": "Мой ресторан",
            "categories": [
                { "id": "breakfast", "name": "Завтраки" },
                { "id": "salads", "name": "Салаты" },
                { "id": "hot", "name": "Горячее" },
                { "id": "drinks", "name": "Напитки" }
            ],
            "items": [
                { "id":1, "category":"breakfast", "name":"Омлет с овощами", "price":1200, "weight":"250 г", "desc":"Воздушный омлет с помидорами, шпинатом и сыром", "emoji":"🍳" },
                { "id":2, "category":"breakfast", "name":"Сырники со сметаной", "price":1500, "weight":"200 г", "desc":"Нежные сырники из фермерского творога", "emoji":"🥞" },
                { "id":3, "category":"salads", "name":"Цезарь с курицей", "price":1800, "weight":"280 г", "desc":"Классический салат с соусом собственного приготовления", "emoji":"🥗" },
                { "id":4, "category":"salads", "name":"Греческий", "price":1400, "weight":"250 г", "desc":"Свежие овощи, оливки, фета", "emoji":"🥬" },
                { "id":5, "category":"hot", "name":"Стейк из лосося", "price":3200, "weight":"180 г", "desc":"Лосось на гриле с лимонным соусом и овощами", "emoji":"🐟" },
                { "id":6, "category":"hot", "name":"Паста карбонара", "price":2200, "weight":"300 г", "desc":"С беконом, яйцом и пармезаном", "emoji":"🍝" },
                { "id":7, "category":"drinks", "name":"Эспрессо", "price":600, "weight":"30 мл", "desc":"Крепкий ароматный кофе", "emoji":"☕" },
                { "id":8, "category":"drinks", "name":"Лимонад домашний", "price":800, "weight":"300 мл", "desc":"Освежающий, с мятой и лаймом", "emoji":"🍹" },
                { "id":9, "category":"hot", "name":"Суп-пюре грибной", "price":1100, "weight":"300 мл", "desc":"Из белых грибов со сливками", "emoji":"🍄" }
            ]
        };
    </script>

    <script>
        (function() {
            const searchInput = document.getElementById('searchInput');
            const maxPriceInput = document.getElementById('maxPriceInput');
            const clearBtn = document.getElementById('clearFilters');
            const tabsContainer = document.getElementById('tabsContainer');
            const menuGrid = document.getElementById('menuGrid');
            const themeBtn = document.getElementById('themeBtn');
            const qrBtn = document.getElementById('qrBtn');
            const qrModal = document.getElementById('qrModal');
            const qrCanvas = document.getElementById('qrCanvas');
            const detailModal = document.getElementById('detailModal');
            const closeDetailBtn = document.getElementById('closeDetailModal');
            const closeQrBtn = document.getElementById('closeQrModal');
            const downloadPngBtn = document.getElementById('downloadPng');
            const downloadPdfQrBtn = document.getElementById('downloadPdfQr');
            const printBtn = document.getElementById('printBtn');

            let currentCategory = 'all';
            let searchTerm = '';
            let maxPrice = Infinity;

            function setTheme(isDark) {
                document.body.classList.toggle('dark', isDark);
                localStorage.setItem('menuTheme', isDark ? 'dark' : 'light');
            }
            setTheme(localStorage.getItem('menuTheme') === 'dark');
            themeBtn.addEventListener('click', () => setTheme(!document.body.classList.contains('dark')));

            function highlight(text, term) {
                if (!term.trim()) return text;
                const regex = new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                return text.replace(regex, '<span class="highlight">$1</span>');
            }

            function getFilteredItems() {
                let items = menuData.items;
                if (currentCategory !== 'all') {
                    items = items.filter(item => item.category === currentCategory);
                }
                const term = searchTerm.trim().toLowerCase();
                if (term) {
                    items = items.filter(item =>
                        item.name.toLowerCase().includes(term) ||
                        (item.desc && item.desc.toLowerCase().includes(term)) ||
                        String(item.price).includes(term)
                    );
                }
                if (maxPrice !== Infinity && !isNaN(maxPrice)) {
                    items = items.filter(item => item.price <= maxPrice);
                }
                return items;
            }

            function renderTabs() {
                tabsContainer.innerHTML = `<div class="tab ${currentCategory==='all'?'active':''}" data-cat="all">Все</div>`;
                menuData.categories.forEach(cat => {
                    const tab = document.createElement('div');
                    tab.className = `tab ${currentCategory===cat.id?'active':''}`;
                    tab.dataset.cat = cat.id;
                    tab.textContent = cat.name;
                    tabsContainer.appendChild(tab);
                });
                document.querySelectorAll('.tab').forEach(tab => {
                    tab.addEventListener('click', (e) => {
                        currentCategory = e.target.dataset.cat;
                        searchInput.value = '';
                        maxPriceInput.value = '';
                        searchTerm = '';
                        maxPrice = Infinity;
                        renderAll();
                    });
                });
            }

            function renderItems() {
                const items = getFilteredItems();
                menuGrid.innerHTML = '';
                if (items.length === 0) {
                    menuGrid.innerHTML = '<div class="empty-state">😔 Ничего не найдено</div>';
                    return;
                }
                items.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'menu-item';
                    const imgContent = item.emoji
                        ? `<div class="item-img emoji-placeholder">${item.emoji}</div>`
                        : (item.img ? `<img src="${item.img}" class="item-img" loading="lazy" alt="${item.name}">`
                                     : `<div class="item-img emoji-placeholder">🍽️</div>`);
                    card.innerHTML = `
                        ${imgContent}
                        <div class="item-info">
                            <div class="item-name">${highlight(item.name, searchTerm)}</div>
                            ${item.desc ? `<div class="item-desc">${highlight(item.desc, searchTerm)}</div>` : ''}
                            <div class="item-footer">
                                <span class="item-price">${item.price} ₸</span>
                                ${item.weight ? `<span class="item-weight">${item.weight}</span>` : ''}
                            </div>
                        </div>
                    `;
                    card.addEventListener('click', () => showDetail(item));
                    menuGrid.appendChild(card);
                });
            }

            function showDetail(item) {
                document.getElementById('modalImg').innerHTML = item.emoji
                    ? `<div style="font-size:5rem;">${item.emoji}</div>`
                    : (item.img ? `<img src="${item.img}" style="width:100%;height:200px;object-fit:cover;border-radius:16px;">`
                                 : `<div style="font-size:5rem;">🍽️</div>`);
                document.getElementById('modalName').textContent = item.name;
                document.getElementById('modalDesc').textContent = item.desc || '';
                document.getElementById('modalPrice').textContent = item.price + ' ₸';
                document.getElementById('modalWeight').textContent = item.weight || '';
                detailModal.classList.add('active');
            }

            function hideDetail() { detailModal.classList.remove('active'); }
            closeDetailBtn.addEventListener('click', hideDetail);
            detailModal.addEventListener('click', (e) => { if (e.target === detailModal) hideDetail(); });

            // QR generation
            function generateQR() {
                const url = window.location.href.split('?')[0];
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
                img.onload = () => {
                    const ctx = qrCanvas.getContext('2d');
                    qrCanvas.width = img.width;
                    qrCanvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                };
                img.onerror = () => {
                    qrCanvas.parentElement.innerHTML = '<p style="color:red;">Could not load QR code</p>';
                };
            }

            qrBtn.addEventListener('click', () => {
                generateQR();
                qrModal.classList.add('active');
            });
            closeQrBtn.addEventListener('click', () => qrModal.classList.remove('active'));
            qrModal.addEventListener('click', (e) => { if (e.target === qrModal) qrModal.classList.remove('active'); });

            downloadPngBtn.addEventListener('click', () => {
                const link = document.createElement('a');
                link.download = 'menu-qr.png';
                link.href = qrCanvas.toDataURL('image/png');
                link.click();
            });

            downloadPdfQrBtn.addEventListener('click', () => {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'mm', 'a4');
                const imgData = qrCanvas.toDataURL('image/png');
                const imgWidth = 80;
                const imgHeight = 80;
                const x = (pdf.internal.pageSize.getWidth() - imgWidth) / 2;
                const y = 50;
                // Только изображение, без текста
                pdf.addImage(imgData, 'PNG', x, y, imgWidth, imgHeight);
                pdf.setFontSize(10);
                pdf.text('Scan to open the menu', x, y + imgHeight + 10);
                pdf.save('qr-menu.pdf');
            });

            // Печать меню
            printBtn.addEventListener('click', () => {
                window.print();
            });

            // Filters
            searchInput.addEventListener('input', (e) => { searchTerm = e.target.value; renderItems(); });
            maxPriceInput.addEventListener('input', (e) => {
                const val = parseInt(e.target.value);
                maxPrice = isNaN(val) ? Infinity : val;
                renderItems();
            });
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                maxPriceInput.value = '';
                searchTerm = '';
                maxPrice = Infinity;
                currentCategory = 'all';
                renderAll();
            });

            function renderAll() {
                renderTabs();
                renderItems();
            }

            // PWA
            if ('serviceWorker' in navigator) {
                const swCode = `const C='menu-v5';self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll(['/','/index.html'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`;
                const blob = new Blob([swCode], {type:'application/javascript'});
                navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
            }

            renderAll();
        })();
    </script>
</body>
</html>
