<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium Menu | QR-Order</title>
    <meta name="theme-color" content="#E05A47">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #F8F9FA;
            --card: #FFFFFF;
            --primary: #E05A47;
            --primary-light: #FCEBE8;
            --text: #1A1A1A;
            --text-light: #71717A;
            --border: #E4E4E7;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 12px 24px rgba(0, 0, 0, 0.06);
            --font: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        .dark {
            --bg: #121214;
            --card: #1E1E22;
            --text: #F4F4F5;
            --text-light: #A1A1AA;
            --border: #2A2A30;
            --primary-light: #351F1C;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 16px 32px rgba(0, 0, 0, 0.3);
        }

        /* Убираем синее выделение при тапе на мобилках отовсюду */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-font-smoothing: antialiased; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }
        
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            transition: background 0.25s ease, color 0.25s ease;
            padding-bottom: 110px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            width: 100%;
        }

        .header {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
            width: 100%;
        }
        
        .brand {
            text-align: center;
            width: 100%;
        }
        .brand h1 { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.5px; word-break: break-word; }
        .brand p { font-size: 0.85rem; color: var(--text-light); margin-top: 2px; }

        .actions-bar { 
            display: flex; 
            gap: 0.5rem; 
            align-items: center; 
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        @media(min-width: 600px) {
            .header {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .brand { text-align: left; width: auto; }
            .actions-bar { justify-content: flex-end; width: auto; }
        }
        
        .select-custom {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 0.5rem 0.7rem;
            border-radius: 10px;
            font-family: var(--font);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }

        .btn-round {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
        }
        .btn-round svg { width: 18px; height: 18px; fill: var(--text); }

        .search-container { position: relative; margin-bottom: 1.25rem; width: 100%; }
        .search-input {
            width: 100%; padding: 0.8rem 2.5rem; border: 1px solid var(--border);
            border-radius: var(--radius-md); background: var(--card); color: var(--text);
            font-family: var(--font); font-size: 0.9rem; box-shadow: var(--shadow-sm);
        }
        .search-input:focus { border-color: var(--primary); }
        .search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 1rem; }
        .clear-search-btn { position: absolute; right: 0.8rem; top: 50%; transform: translateY(-50%); background: transparent; border: none; color: var(--text-light); font-size: 1rem; cursor: pointer; display: none; }

        .categories-scroll {
            display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 0.5rem; margin-bottom: 1.25rem; scrollbar-width: none; width: 100%;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .chip {
            padding: 0.5rem 1.1rem; background: var(--card); border: 1px solid var(--border); border-radius: 100px;
            font-size: 0.85rem; font-weight: 600; white-space: nowrap; cursor: pointer; color: var(--text-light);
        }
        .chip.active { background: var(--primary); color: #FFF; border-color: var(--primary); }

        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 0.85rem; width: 100%; }
        @media(min-width: 650px) { .menu-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; } }

        .product-card {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg);
            padding: 0.9rem; display: flex; gap: 0.9rem; position: relative; box-shadow: var(--shadow-sm); cursor: pointer;
            align-items: center; min-width: 0;
        }
        
        .prod-img-box {
            position: relative; width: 85px; height: 85px; background: var(--bg); border-radius: var(--radius-md);
            overflow: hidden; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
        }

        .badge {
            position: absolute; top: 4px; left: 4px; background: rgba(255,255,255,0.95); color: #1A1A1A;
            padding: 2px 5px; border-radius: 4px; font-size: 0.6rem; font-weight: 800; z-index: 2;
        }

        .prod-details { display: flex; flex-direction: column; justify-content: space-between; flex: 1; min-width: 0; height: 100%; }
        .prod-title { font-weight: 700; font-size: 1.05rem; letter-spacing: -0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .prod-desc { font-size: 0.8rem; color: var(--text-light); margin: 2px 0 8px 0; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .prod-row { display: flex; justify-content: space-between; align-items: center; margin-top: auto; gap: 0.5rem; }
        .prod-price { font-weight: 800; font-size: 1.1rem; color: var(--text); white-space: nowrap; }
        
        .stepper-container { display: flex; align-items: center; gap: 0.6rem; position: relative; z-index: 5; }
        
        .btn-add {
            background: var(--primary); color: #FFFFFF; border: none; 
            padding: 0.55rem 1.1rem; border-radius: 12px; font-weight: 800; 
            font-size: 0.85rem; cursor: pointer; transition: transform 0.1s ease;
            box-shadow: 0 4px 8px rgba(224, 90, 71, 0.2); white-space: nowrap;
        }
        .btn-add:active { transform: scale(0.95); }

        .btn-stepper {
            background: var(--primary-light); color: var(--primary); border: none; width: 32px; height: 32px;
            border-radius: 10px; font-weight: 700; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .stepper-count { font-size: 0.95rem; font-weight: 700; min-width: 20px; text-align: center; }

        .modal-section-title { font-size: 0.85rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); margin-top: 1.25rem; margin-bottom: 0.4rem; letter-spacing: 0.5px; }
        .modal-section-text { font-size: 0.95rem; color: var(--text); line-height: 1.45; }

        .cart-bar {
            position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); width: calc(100% - 24px); max-width: 500px;
            background: #1E1E22; color: #FFF; padding: 0.85rem 1.2rem; border-radius: 100px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 12px 24px rgba(0,0,0,0.25); z-index: 99; visibility: hidden; opacity: 0; transform: translateX(-50%) translateY(10px); transition: all 0.3s ease; border: 1px solid #2A2A30;
        }
        .cart-bar.active { visibility: visible; opacity: 1; transform: translateX(-50%) translateY(0); }
        .cart-info { display: flex; flex-direction: column; }
        .cart-count { font-size: 0.75rem; color: #A1A1AA; }
        .cart-total { font-size: 1.1rem; font-weight: 700; }
        .btn-checkout { background: var(--primary); color: white; border: none; padding: 0.5rem 1rem; border-radius: 100px; font-weight: 700; font-size: 0.85rem; cursor: pointer; }

        .overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 999; opacity: 0; visibility: hidden; transition: 0.2s;
            padding: 1rem;
        }
        .overlay.active { opacity: 1; visibility: visible; }
        
        .modal-sheet {
            background: var(--card); width: 100%; max-width: 440px; border-radius: var(--radius-lg); padding: 2.2rem 1.25rem 1.5rem 1.25rem;
            transform: translateY(15px); transition: transform 0.2s; position: relative; border: 1px solid var(--border); max-height: 85vh; overflow-y: auto;
        }
        .overlay.active .modal-sheet { transform: translateY(0); }
        .modal-close-trigger {
            position: absolute; top: 12px; right: 12px; background: var(--bg); border: 1px solid var(--border);
            width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; font-weight: bold; cursor: pointer; color: var(--text); z-index: 10;
        }

        #qrcode-wrapper { display: inline-block; cursor: pointer; position: relative; margin: 0 auto;}
        #qrcode { padding: 10px; background: white; border-radius: 12px; }
        .toast {
            position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-30px); background: #1A1A1E; color: white; padding: 0.6rem 1.2rem; border-radius: 50px;
            font-size: 0.85rem; font-weight: 600; box-shadow: var(--shadow-md); z-index: 1000; opacity: 0; transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="toast" id="toastNotice"></div>

    <div class="container">
        <header class="header">
            <div class="brand">
                <h1 id="restName">Marrone Rosso</h1>
                <p id="restSub">Premium Cafe & Restaurant</p>
            </div>
            <div class="actions-bar">
                <select class="select-custom" id="langSelector">
                    <option value="ru">RU</option>
                    <option value="en">EN</option>
                </select>
                <select class="select-custom" id="currencySelector">
                    <option value="AMD">֏ (AMD)</option>
                    <option value="USD">$ (USD)</option>
                    <option value="EUR">€ (EUR)</option>
                    <option value="RUB">₽ (RUB)</option>
                </select>
                <button class="btn-round" id="copyLinkToggle"><svg viewBox="0 0 24 24"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7c-2.76 0-5 2.24-5 5s2.24 5 5 5h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4c2.76 0 5-2.24 5-5s-2.24-5-5-5z"/></svg></button>
                <button class="btn-round" id="themeToggle"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.38 5.38 0 0 1-4.4 2.26 5.4 5.4 0 0 1-5.14-5.14 5.38 5.38 0 0 1 2.26-4.4c-.44-.06-.9-.1-1.36-.1z"/></svg></button>
                <button class="btn-round" id="qrToggle"><svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm2 2v4h4V5H5zm8-2h8v8h-8V3zm2 2v4h4V5h-4zM3 13h8v8H3v-8zm2 2v4h4v-4H5zm13 0h3v2h-3v-2zm-2-2h2v2h-2v-2zm2 4h2v4h-2v-4zm-2 2h2v2h-2v-2zm-2-2h2v2h-2v-2zm2-2h2v2h-2v-2zm4-2h2v2h-2v-2z"/></svg></button>
            </div>
        </header>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" class="search-input" id="searchField" placeholder="Поиск...">
            <button class="clear-search-btn" id="clearSearchClick">✕</button>
        </div>

        <div class="categories-scroll" id="categoriesWrapper"></div>
        <main class="menu-grid" id="menuWrapper"></main>
    </div>

    <div class="cart-bar" id="cartIndicator">
        <div class="cart-info">
            <span class="cart-count" id="cartCount">0 items</span>
            <span class="cart-total" id="cartTotal">0 ֏</span>
        </div>
        <button class="btn-checkout" id="orderAction">Order</button>
    </div>

    <div class="overlay" id="detailModal" onclick="closeModals(event)">
        <div class="modal-sheet">
            <button class="modal-close-trigger" onclick="forceCloseAll()">✕</button>
            <div id="detailImgBox" style="font-size: 3.5rem; background: var(--bg); padding: 1rem; border-radius: var(--radius-md); text-align: center; margin-bottom: 1rem;"></div>
            <h2 id="detailTitle" style="font-weight: 800; margin-bottom: 0.25rem; font-size: 1.3rem;"></h2>
            
            <div id="detailWeight" style="font-size: 0.85rem; color: var(--text-light); margin-bottom: 1rem;"></div>
            
            <div class="modal-section-title" id="lblDesc">Описание</div>
            <p id="detailDesc" class="modal-section-text"></p>
            
            <div class="modal-section-title" id="lblIngredients">Состав и Ингредиенты</div>
            <p id="detailIngredients" class="modal-section-text"></p>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1.75rem; padding-top: 1.25rem; border-top: 1px solid var(--border);">
                <span id="detailPrice" style="font-size: 1.3rem; font-weight: 800; color: var(--primary);"></span>
                <div id="detailStepperPlace"></div>
            </div>
        </div>
    </div>

    <div class="overlay" id="qrModal" onclick="closeModals(event)">
        <div class="modal-sheet" style="text-align: center;">
            <button class="modal-close-trigger" onclick="forceCloseAll()">✕</button>
            <h3 id="qrModalTitle" style="margin-bottom: 1.25rem; font-weight: 800; font-size: 1.1rem;">QR Code</h3>
            <div id="qrcode-wrapper"><div id="qrcode"></div></div>
            <p id="qrModalTip" style="font-size:0.8rem; color:var(--text-light); margin-top:1.25rem;">Click to download</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        const db = {
            restaurantName: "Marrone Rosso",
            categories: {
                ru: [{ id: "all", name: "Все" }, { id: "breakfast", name: "Завтраки" }, { id: "hot", name: "Горячее" }, { id: "drinks", name: "Напитки" }],
                en: [{ id: "all", name: "All" }, { id: "breakfast", name: "Breakfast" }, { id: "hot", name: "Mains" }, { id: "drinks", name: "Drinks" }]
            },
            items: [
                { 
                    id: 1, 
                    category: "breakfast", 
                    name: {ru: "Сырники из творога", en: "Cottage Cheese Pancakes"}, 
                    priceAMD: 1500, 
                    weight: {ru: "220 г", en: "220 g"},
                    desc: {ru: "Нежные сырники из натурального фермерского творога. Подаются горячими с прохладной сметаной и домашним конфитюром.", en: "Fluffy pancakes made from local cottage cheese. Served warm with fresh sour cream and homemade berry jam."}, 
                    ingredients: {ru: "Творог 9%, фермерские яйца, пшеничная мука высшего сорта, тростниковый сахар, натуральная ваниль, лесные ягоды.", en: "Cottage cheese 9%, organic eggs, premium wheat flour, cane sugar, natural vanilla, wild berries."},
                    emoji: "🥞", 
                    tag: {ru: "Хит", en: "Hit"} 
                },
                { 
                    id: 2, 
                    category: "hot", 
                    name: {ru: "Паста Карбонара", en: "Pasta Carbonara"}, 
                    priceAMD: 2400, 
                    weight: {ru: "350 г", en: "350 g"},
                    desc: {ru: "Классическая паста родом из Рима. Тонкие спагетти, смешанные с пикантным соусом из яичных желтков и ароматного сыра с хрустящим беконом.", en: "A Roman classic. Al dente spaghetti tossed in a rich, creamy sauce of egg yolks, authentic aged cheese, and crispy cured bacon."}, 
                    ingredients: {ru: "Спагетти из твердых сортов пшеницы, подкопченный свиной бекон, сыр Пармезан, яичный желток, сливки 20%, черный перец.", en: "Durum wheat spaghetti, smoked bacon, Parmesan cheese, fresh egg yolk, 20% heavy cream, freshly ground black pepper."},
                    emoji: "🍝", 
                    tag: {ru: "", en: ""} 
                },
                { 
                    id: 3, 
                    category: "hot", 
                    name: {ru: "Том Ям с креветками", en: "Tom Yum Soup"}, 
                    priceAMD: 3200, 
                    weight: {ru: "400 мл", en: "400 ml"},
                    desc: {ru: "Знаменитый тайский кисло-острый суп. Насыщенный бульон на кокосовом молоке с добавлением лемонграсса, листьев лайма и свежих морепродуктов.", en: "The iconic Thai hot and sour soup. A fragrant coconut-infused broth bursting with lemongrass, galangal, lime leaves, and tender ocean shrimps."}, 
                    ingredients: {ru: "Тигровые креветки, кокосовое молоко, грибы вешенки, лемонграсс, паста Том Ям, кинза, перец чили, сок лайма.", en: "Tiger prawns, coconut milk, oyster mushrooms, lemongrass, Tom Yum paste, fresh cilantro, chili pepper, lime juice."},
                    emoji: "🍜", 
                    tag: {ru: "Острое", en: "Spicy"} 
                },
                { 
                    id: 4, 
                    category: "drinks", 
                    name: {ru: "Домашний лимонад", en: "Homemade Lemonade"}, 
                    priceAMD: 1100, 
                    weight: {ru: "330 мл", en: "330 ml"},
                    desc: {ru: "Освежающий авторский напиток на основе натурального сока цитрусовых. Идеально сбалансированная кислинка и сладость.", en: "Crisp and invigorating signature beverage made from freshly squeezed citrus fruit juices. Perfectly balanced sweet and sour notes."}, 
                    ingredients: {ru: "Лимонный сок, сок спелого апельсина, газированная очищенная вода, домашний сахарный сироп, свежая перечная мята, лед.", en: "Fresh lemon juice, orange juice, sparkling water, homemade simple syrup, fresh peppermint leaves, crushed ice."},
                    emoji: "🍹", 
                    tag: {ru: "New", en: "New"} 
                }
            ],
            ui: {
                ru: { 
                    search: "Поиск любимого блюда...", checkout: "Показать заказ", count: "Выбрано: {n} блюд", 
                    copied: "Ссылка скопирована!", qrTitle: "QR-код этого меню", qrTip: "Нажмите на код, чтобы скачать его в PNG", 
                    addBtn: "Добавить", lblDesc: "Описание", lblIngredients: "Состав и Ингредиенты"
                },
                en: { 
                    search: "Search dishes...", checkout: "View Order", count: "{n} items selected", 
                    copied: "Link copied to clipboard!", qrTitle: "Menu QR Code", qrTip: "Click QR code to download PNG", 
                    addBtn: "Add", lblDesc: "Description", lblIngredients: "Ingredients & Recipe"
                }
            }
        };

        let exchangeRates = { AMD: 1, USD: 0.0026, EUR: 0.0024, RUB: 0.24 };
        let currentLang = "ru";
        let currentCurrency = "AMD";
        let currencySymbols = { AMD: "֏", USD: "$", EUR: "€", RUB: "₽" };
        
        let cart = {};
        let activeCategory = "all";
        let searchQuery = "";
        let currentDetailItem = null;

        async function fetchExchangeRates() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/AMD');
                const data = await res.json();
                if(data && data.rates) {
                    exchangeRates.USD = data.rates.USD || exchangeRates.USD;
                    exchangeRates.EUR = data.rates.EUR || exchangeRates.EUR;
                    exchangeRates.RUB = data.rates.RUB || exchangeRates.RUB;
                    renderMenu();
                    updateCartBar();
                }
            } catch (e) { console.log("Using backup rates"); }
        }

        function getConvertedPrice(priceInAmd) {
            const rawPrice = priceInAmd * exchangeRates[currentCurrency];
            if(currentCurrency === 'USD' || currentCurrency === 'EUR') return rawPrice.toFixed(2);
            return Math.round(rawPrice);
        }

        function renderCategories() {
            const wrapper = document.getElementById('categoriesWrapper');
            wrapper.innerHTML = db.categories[currentLang].map(cat => `
                <div class="chip ${activeCategory === cat.id ? 'active' : ''}" onclick="setCategory('${cat.id}')">
                    ${cat.name}
                </div>
            `).join('');
        }

        function setCategory(id) {
            activeCategory = id;
            renderCategories();
            renderMenu();
        }

        function generateStepperHtml(itemId) {
            const count = cart[itemId] || 0;
            if (count === 0) {
                return `<button class="btn-add" onclick="event.stopPropagation(); changeQty(${itemId}, 1)">${db.ui[currentLang].addBtn}</button>`;
            } else {
                return `
                    <div class="stepper-container" onclick="event.stopPropagation();">
                        <button class="btn-stepper" onclick="changeQty(${itemId}, -1)">−</button>
                        <span class="stepper-count">${count}</span>
                        <button class="btn-stepper" onclick="changeQty(${itemId}, 1)">+</button>
                    </div>
                `;
            }
        }

        function renderMenu() {
            const wrapper = document.getElementById('menuWrapper');
            const filtered = db.items.filter(item => {
                const matchCat = activeCategory === "all" || item.category === activeCategory;
                const nameText = item.name[currentLang].toLowerCase();
                const descText = item.desc[currentLang].toLowerCase();
                return matchCat && (nameText.includes(searchQuery.toLowerCase()) || descText.includes(searchQuery.toLowerCase()));
            });

            if(filtered.length === 0) {
                wrapper.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:3rem; color:var(--text-light)">${currentLang=='ru'?'Ничего не найдено':'No items found'}</div>`;
                return;
            }

            wrapper.innerHTML = filtered.map(item => {
                return `
                    <div class="product-card" onclick="openDetail(${item.id}, event)">
                        <div class="prod-img-box">
                            ${item.tag[currentLang] ? `<span class="badge">${item.tag[currentLang]}</span>` : ''}
                            ${item.emoji}
                        </div>
                        <div class="prod-details">
                            <div>
                                <h3 class="prod-title">${item.name[currentLang]}</h3>
                                <p class="prod-desc">${item.desc[currentLang]}</p>
                            </div>
                            <div class="prod-row">
                                <span class="prod-price">${getConvertedPrice(item.priceAMD)} ${currencySymbols[currentCurrency]}</span>
                                ${generateStepperHtml(item.id)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function changeQty(id, delta) {
            const current = cart[id] || 0;
            const next = current + delta;
            if (next <= 0) delete cart[id];
            else cart[id] = next;
            
            updateCartBar();
            renderMenu();
            
            if (currentDetailItem && currentDetailItem.id === id) {
                document.getElementById('detailStepperPlace').innerHTML = generateStepperHtml(id);
            }
        }

        function updateCartBar() {
            const bar = document.getElementById('cartIndicator');
            const totalItems = Object.values(cart).reduce((a, b) => a + b, 0);
            
            if(totalItems > 0) {
                let totalPriceAmd = 0;
                db.items.forEach(item => {
                    if(cart[item.id]) totalPriceAmd += item.priceAMD * cart[item.id];
                });
                
                document.getElementById('cartCount').textContent = db.ui[currentLang].count.replace('{n}', totalItems);
                document.getElementById('cartTotal').textContent = `${getConvertedPrice(totalPriceAmd)} ${currencySymbols[currentCurrency]}`;
                document.getElementById('orderAction').textContent = db.ui[currentLang].checkout;
                bar.classList.add('active');
            } else {
                bar.classList.remove('active');
            }
        }

        function openDetail(id, event) {
            const item = db.items.find(i => i.id === id);
            currentDetailItem = item;
            
            document.getElementById('lblDesc').textContent = db.ui[currentLang].lblDesc;
            document.getElementById('lblIngredients').textContent = db.ui[currentLang].lblIngredients;

            document.getElementById('detailImgBox').textContent = item.emoji;
            document.getElementById('detailTitle').textContent = item.name[currentLang];
            document.getElementById('detailWeight').textContent = item.weight[currentLang];
            document.getElementById('detailDesc').textContent = item.desc[currentLang];
            document.getElementById('detailIngredients').textContent = item.ingredients[currentLang];
            
            document.getElementById('detailPrice').textContent = `${getConvertedPrice(item.priceAMD)} ${currencySymbols[currentCurrency]}`;
            document.getElementById('detailStepperPlace').innerHTML = generateStepperHtml(item.id);

            document.getElementById('detailModal').classList.add('active');
        }

        function closeModals(e) {
            if (e.target.classList.contains('overlay')) forceCloseAll();
        }

        function forceCloseAll() {
            document.getElementById('qrModal').classList.remove('active');
            document.getElementById('detailModal').classList.remove('active');
            currentDetailItem = null;
        }

        document.getElementById('langSelector').addEventListener('change', (e) => {
            currentLang = e.target.value;
            document.getElementById('searchField').placeholder = db.ui[currentLang].search;
            renderCategories();
            renderMenu();
            updateCartBar();
        });

        document.getElementById('currencySelector').addEventListener('change', (e) => {
            currentCurrency = e.target.value;
            renderMenu();
            updateCartBar();
            if(currentDetailItem) {
                document.getElementById('detailPrice').textContent = `${getConvertedPrice(currentDetailItem.priceAMD)} ${currencySymbols[currentCurrency]}`;
            }
        });

        const searchField = document.getElementById('searchField');
        const clearSearchClick = document.getElementById('clearSearchClick');

        searchField.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            clearSearchClick.style.display = searchQuery.length > 0 ? 'block' : 'none';
            renderMenu();
        });

        clearSearchClick.addEventListener('click', () => {
            searchField.value = ""; searchQuery = "";
            clearSearchClick.style.display = 'none'; renderMenu();
        });

        document.getElementById('copyLinkToggle').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href.split('?')[0]).then(() => {
                const toast = document.getElementById('toastNotice');
                toast.textContent = db.ui[currentLang].copied;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        });

        document.getElementById('themeToggle').addEventListener('click', () => {
            document.body.classList.toggle('dark');
        });

        const qrModal = document.getElementById('qrModal');
        let qrGenerated = false;

        document.getElementById('qrToggle').addEventListener('click', () => {
            document.getElementById('qrModalTitle').textContent = db.ui[currentLang].qrTitle;
            document.getElementById('qrModalTip').textContent = db.ui[currentLang].qrTip;
            qrModal.classList.add('active');
            if(!qrGenerated) {
                new QRCode(document.getElementById("qrcode"), {
                    text: window.location.href.split('?')[0],
                    width: 200, height: 200,
                    colorDark : "#1A1A1E", colorLight : "#ffffff"
                });
                qrGenerated = true;
            }
        });

        document.getElementById('qrcode-wrapper').addEventListener('click', () => {
            const qrCanvas = document.querySelector('#qrcode canvas');
            if(qrCanvas) {
                const downloadLink = document.createElement('a');
                downloadLink.href = qrCanvas.toDataURL("image/png");
                downloadLink.download = `menu-qr.png`;
                downloadLink.click();
            }
        });

        fetchExchangeRates();
        renderCategories();
        renderMenu();
    </script>
</body>
</html>
